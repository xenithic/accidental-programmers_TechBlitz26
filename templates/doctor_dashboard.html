<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Clinic System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Schedule</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white">Dr. {{ current_user.name }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Doctor Dashboard</h2>
        <hr>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Today's Appointments</h5>
                    </div>
                    <div class="card-body" id="docAppointmentsContainer">
                        <p class="text-muted">Loading appointments...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/appointments/doctor')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('docAppointmentsContainer');
                    if (!data || data.length === 0) {
                        container.innerHTML = '<p class="text-muted">No appointments scheduled.</p>';
                        return;
                    }

                    let tableHTML = `
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Patient</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.forEach(appt => {
                        tableHTML += `
                            <tr>
                                <td>${appt.patient_name}</td>
                                <td>${appt.date}</td>
                                <td>${appt.time}</td>
                                <td><span class="badge bg-success">${appt.status}</span></td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                            </tbody>
                        </table>
                    `;
                    container.innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error('Error fetching appointments:', error);
                    document.getElementById('docAppointmentsContainer').innerHTML = '<p class="text-danger">Failed to load appointments.</p>';
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - ClinicOS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="#">
                <i class="bi bi-hospital-fill me-2 fs-3"></i>ClinicOS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link nav-link-custom active" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="#">Schedule</a></li>
                    <li class="nav-item ms-lg-3">
                        <div class="d-flex align-items-center bg-success bg-opacity-10 text-success rounded-pill px-3 py-1">
                            <i class="bi bi-person-badge-fill me-2"></i>
                            <span class="fw-semibold">Dr. {{ current_user.name }}</span>
                        </div>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3" href="{{ url_for('auth.logout') }}">
                            <i class="bi bi-box-arrow-right"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success"><i class="bi bi-clipboard2-pulse me-2"></i>Doctor Dashboard</h2>
        </div>
        
        <div class="row align-items-stretch mb-4">
            <div class="col-md-5 mb-3 mb-md-0">
                <div class="card text-center text-white bg-success shadow-sm h-100">
                    <div class="card-body d-flex flex-column justify-content-center py-4">
                        <i class="bi bi-people-fill opacity-75 display-4 mb-2"></i>
                        <h2 class="card-title display-5 fw-bold mb-0" id="todayApptCount">0</h2>
                        <p class="card-text fs-5 mt-2">Today's Appointments</p>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column justify-content-center px-4">
                        <h4 class="card-title fw-bold text-dark mb-3"><i class="bi bi-info-circle text-success me-2"></i> Welcome back, Dr. {{ current_user.name }}!</h4>
                        <p class="card-text text-muted mb-0">Here is a quick overview of your schedule. Keep tracking your daily appointments efficiently.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-md-12">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3 border-bottom-0">
                        <h5 class="mb-0 fw-bold text-secondary"><i class="bi bi-calendar-check me-2"></i>Today's Schedule</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" id="docAppointmentsContainer">
                            <div class="p-4 text-center">
                                <div class="spinner-border text-success" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="text-muted mt-2">Loading schedule...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/appointments/doctor')
                .then(response => response.json())
                .then(data => {
                    const today = new Date().toISOString().split('T')[0];
                    const todayData = data.filter(appt => appt.date === today);
                    
                    document.getElementById('todayApptCount').innerText = todayData.length;

                    const container = document.getElementById('docAppointmentsContainer');
                    if (!todayData || todayData.length === 0) {
                        container.innerHTML = '<div class="p-5 text-center"><i class="bi bi-calendar2-check display-1 text-muted opacity-50 mb-3 d-block"></i><p class="text-muted fs-5">No appointments scheduled for today.</p></div>';
                        return;
                    }

                    todayData.sort((a, b) => a.time.localeCompare(b.time));

                    let tableHTML = `
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Time</th>
                                    <th>Patient</th>
                                    <th class="pe-4 text-end">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    todayData.forEach(appt => {
                        let badgeClass = 'bg-secondary';
                        let statusText = appt.status.charAt(0).toUpperCase() + appt.status.slice(1);
                        if (appt.status === 'booked') badgeClass = 'bg-success';
                        if (appt.status === 'cancelled') badgeClass = 'bg-danger';

                        tableHTML += `
                            <tr>
                                <td class="ps-4 fw-medium"><i class="bi bi-clock me-2 text-muted"></i>${appt.time}</td>
                                <td><i class="bi bi-person me-2 text-muted"></i>${appt.patient_name}</td>
                                <td class="pe-4 text-end"><span class="badge ${badgeClass} rounded-pill">${statusText}</span></td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                            </tbody>
                        </table>
                    `;
                    container.innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error('Error fetching appointments:', error);
                    document.getElementById('docAppointmentsContainer').innerHTML = '<div class="p-4 text-center"><p class="text-danger fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>Failed to load appointments.</p></div>';
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ClinicOS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #e3f2fd 0%, #f1f8ff 100%);
        }
    </style>
</head>
<body class="login-container">
    <div class="container d-flex justify-content-center align-items-center min-vh-100 animate-fade-in">
        <div class="row w-100 justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <div class="text-center mb-5">
                    <div class="stat-icon shadow-sm">
                        <i class="bi bi-heart-pulse"></i>
                    </div>
                    <h1 class="fw-bold text-primary mb-0">ClinicOS</h1>
                    <p class="text-muted fw-medium">Smart Healthcare Management</p>
                </div>

                <div class="card modern-card p-4">
                    <div class="card-body">
                        <h4 class="text-center mb-4 fw-bold text-secondary">Welcome Back</h4>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} shadow-sm border-0 d-flex align-items-center rounded py-2">
                                        <i class="bi {% if category == 'success' %}bi-check-circle{% else %}bi-exclamation-triangle{% endif %} me-2"></i>
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold text-secondary">Email Address</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-primary"></i></span>
                                    <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="name@domain.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-secondary">Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-primary"></i></span>
                                    <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>
                            
                            <div class="mt-4">
                                <button type="submit" class="btn btn-premium w-100">
                                    Sign In
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-4 text-center">
                            <hr class="text-muted opacity-25">
                            <p class="mb-0 text-muted small">Need an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Register</a></p>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>

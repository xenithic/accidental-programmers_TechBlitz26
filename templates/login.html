<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinic Appointments</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background-color: #e3f2fd; /* Light medical blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .full-height {
            min-height: 100vh;
        }
        .login-card { 
            border: none; 
            border-radius: 15px; 
            background-color: #ffffff;
        }
        .brand-icon { 
            font-size: 3.5rem; 
            color: #0d6efd; 
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
            border-radius: 8px;
            padding: 10px;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }
    </style>
</head>
<body>
    <div class="container-fluid full-height d-flex justify-content-center align-items-center">
        <div class="row w-100 justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <div class="text-center mb-4">
                    <i class="bi bi-heart-pulse brand-icon mb-2 d-inline-block"></i>
                    <h2 class="fw-bold text-primary mb-0">ClinicOS</h2>
                    <p class="text-muted fs-5">Smart Appointment Scheduler</p>
                </div>

                <div class="card login-card shadow-lg p-4">
                    <div class="card-body">
                        <h4 class="text-center mb-4 fw-bold text-secondary">Login</h4>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} shadow-sm border-0 d-flex align-items-center rounded py-2">
                                        <i class="bi {% if category == 'success' %}bi-check-circle{% else %}bi-exclamation-triangle{% endif %} me-2"></i>
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold text-secondary">Email Address</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-primary"></i></span>
                                    <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="name@domain.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-secondary">Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-primary"></i></span>
                                    <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>
                            
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">
                                    Login
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-4 text-center">
                            <hr class="text-muted opacity-25">
                            <p class="mb-0 text-muted">New patient? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Register here</a></p>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>

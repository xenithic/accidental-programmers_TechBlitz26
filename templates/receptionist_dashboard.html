<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Clinic System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Manage Appointments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('doctors.list_doctors') }}">Manage Doctors</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white">Receptionist {{ current_user.name }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Receptionist Dashboard</h2>
        <hr>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card text-center mb-3">
                    <div class="card-body">
                        <h3 class="card-title">12</h3>
                        <p class="card-text">Today's Appointments</p>
                        <a href="{{ url_for('appointments.book_appointment') }}" class="btn btn-primary btn-sm mt-2">Book Appointment</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center mb-3">
                    <div class="card-body">
                        <h3 class="card-title">5</h3>
                        <p class="card-text">Doctors on Duty</p>
                        <a href="{{ url_for('doctors.list_doctors') }}" class="btn btn-primary btn-sm mt-2">Manage Doctors</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center mb-3">
                    <div class="card-body">
                        <h3 class="card-title">3</h3>
                        <p class="card-text">Pending Approvals</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">All System Appointments</h5>
                    </div>
                    <div class="card-body" id="allAppointmentsContainer">
                        <p class="text-muted">Loading appointments...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/appointments/all')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('allAppointmentsContainer');
                    if (!data || data.length === 0) {
                        container.innerHTML = '<p class="text-muted">No appointments found in the system.</p>';
                        return;
                    }

                    let tableHTML = `
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Doctor</th>
                                    <th>Patient</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.forEach(appt => {
                        tableHTML += `
                            <tr>
                                <td>${appt.doctor_name}</td>
                                <td>${appt.patient_name}</td>
                                <td>${appt.date}</td>
                                <td>${appt.time}</td>
                                <td><span class="badge bg-secondary">${appt.status}</span></td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                            </tbody>
                        </table>
                    `;
                    container.innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error('Error fetching appointments:', error);
                    document.getElementById('allAppointmentsContainer').innerHTML = '<p class="text-danger">Failed to load system appointments.</p>';
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - ClinicOS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .slot-btn { width: 110px; margin: 5px; border-radius: 20px; transition: var(--transition-smooth); }
        .slot-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,110,253,0.2); }
    </style>
</head>
<body>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="/">
                <i class="bi bi-hospital-fill me-2 fs-3"></i>ClinicOS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom active" href="#">Book Appointment</a></li>
                    <li class="nav-item ms-lg-3">
                        <div class="d-flex align-items-center bg-primary bg-opacity-10 text-primary rounded-pill px-3 py-1">
                            <i class="bi bi-person-circle me-2"></i>
                            <span class="fw-semibold">{{ current_user.name }}</span>
                        </div>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3" href="{{ url_for('auth.logout') }}">
                            <i class="bi bi-box-arrow-right"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary"><i class="bi bi-calendar-plus me-2"></i>Book Appointment</h2>
            <a href="/" class="btn btn-outline-secondary rounded-pill"><i class="bi bi-arrow-left me-1"></i> Back</a>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow border-0">
                    <div class="card-header bg-white py-4 border-bottom-0">
                        <h5 class="mb-0 fw-bold text-secondary text-center"><i class="bi bi-clipboard2-check me-2"></i>Select Doctor & Time</h5>
                        <p class="text-muted text-center mt-2 mb-0">Choose your preferred doctor and browse available time slots.</p>
                    </div>
                    <div class="card-body p-5 pt-2">
                        <!-- Alert Box -->
                        <div id="messageBox" class="alert d-none shadow-sm border-0" role="alert"></div>

                        <form id="bookingForm" onsubmit="return false;">
                            <div class="row mb-4">
                                <!-- Doctor Selection -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="bi bi-person-badge text-primary me-2"></i>Select Doctor</label>
                                    <select class="form-select form-select-lg" id="doctorSelect" required>
                                        <option value="" disabled selected>Choose a doctor...</option>
                                        {% for doctor in doctors %}
                                            <option value="{{ doctor.id }}">Dr. {{ doctor.name }} ({{ doctor.specialization }})</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <!-- Date Selection -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="bi bi-calendar text-primary me-2"></i>Select Date</label>
                                    <input type="date" class="form-control form-control-lg" id="dateSelect" required>
                                </div>
                            </div>
                            
                            <hr class="mb-4 text-muted">

                            <!-- Available Slots -->
                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="bi bi-clock-history text-primary me-2"></i>Available Slots</label>
                                <div id="slotsContainer" class="d-flex flex-wrap rounded p-4 bg-light bg-opacity-50 border" style="min-height: 150px;">
                                    <div class="w-100 d-flex flex-column justify-content-center align-items-center text-muted opacity-50 slot-placeholder">
                                        <i class="bi bi-search display-4 mb-3"></i>
                                        <p class="m-0 fs-5">Please select a doctor and date.</p>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const doctorSelect = document.getElementById('doctorSelect');
        const dateSelect = document.getElementById('dateSelect');
        const slotsContainer = document.getElementById('slotsContainer');
        const messageBox = document.getElementById('messageBox');

        // Setup min date to today
        const today = new Date().toISOString().split('T')[0];
        dateSelect.setAttribute('min', today);

        // Fetch slots whenever doctor or date changes
        function fetchSlots() {
            const doctorId = doctorSelect.value;
            const date = dateSelect.value;

            if (doctorId && date) {
                // Clear slots container and set loading UI
                slotsContainer.innerHTML = `
                    <div class="w-100 d-flex flex-column justify-content-center align-items-center py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-muted mt-3">Fetching available slots...</p>
                    </div>
                `;
                messageBox.classList.add('d-none');
                
                fetch(`/appointments/available-slots/${doctorId}/${date}`)
                    .then(response => response.json())
                    .then(data => {
                        slotsContainer.innerHTML = '';
                        const slots = data.available_slots;

                        if (!slots || slots.length === 0) {
                            slotsContainer.innerHTML = `
                                <div class="w-100 d-flex flex-column justify-content-center align-items-center py-4 text-warning">
                                    <i class="bi bi-exclamation-circle display-4 mb-2"></i>
                                    <p class="m-0 fw-bold fs-5">No available slots for the selected date.</p>
                                </div>
                            `;
                            return;
                        }

                        // Render slot buttons
                        slots.forEach(time => {
                            const btn = document.createElement('button');
                            btn.className = 'btn btn-outline-primary m-1 slot-btn fw-bold';
                            btn.innerHTML = `<i class="bi bi-clock me-1"></i>${time}`;
                            btn.onclick = () => confirmBooking(doctorId, date, time);
                            slotsContainer.appendChild(btn);
                        });
                    })
                    .catch(err => {
                        console.error('Error fetching slots:', err);
                        slotsContainer.innerHTML = `
                            <div class="w-100 d-flex flex-column justify-content-center align-items-center py-4 text-danger">
                                <i class="bi bi-x-circle display-4 mb-2"></i>
                                <p class="m-0 fw-bold fs-5">Error fetching available slots.</p>
                            </div>
                        `;
                    });
            } else {
                slotsContainer.innerHTML = `
                    <div class="w-100 d-flex flex-column justify-content-center align-items-center text-muted opacity-50 slot-placeholder py-4">
                        <i class="bi bi-search display-4 mb-3"></i>
                        <p class="m-0 fs-5">Please select a doctor and date.</p>
                    </div>
                `;
            }
        }

        doctorSelect.addEventListener('change', fetchSlots);
        dateSelect.addEventListener('change', fetchSlots);

        function showMessage(msg, type) {
            messageBox.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle'} me-2"></i>${msg}`;
            messageBox.className = `alert alert-${type} shadow-sm border-0 d-flex align-items-center`;
            // Scroll to message
            messageBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function confirmBooking(doctorId, date, time) {
            if (confirm(`Do you want to book an appointment for ${date} at ${time}?`)) {
                
                const bookingData = {
                    doctor_id: doctorId,
                    date: date,
                    time: time
                };

                fetch('/appointments/book', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bookingData)
                })
                .then(response => response.json().then(data => ({ status: response.status, body: data })))
                .then(result => {
                    if (result.status === 201) {
                        showMessage("Appointment booked successfully!", "success");
                        // Clear container immediately so they cant spam it
                        slotsContainer.innerHTML = `
                            <div class="w-100 d-flex flex-column justify-content-center align-items-center py-4 text-success">
                                <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
                                <p class="m-0 fw-bold fs-5">Redirecting to dashboard...</p>
                            </div>
                        `;
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 2000);
                    } else {
                        showMessage(result.body.error || "An error occurred during booking.", "danger");
                        fetchSlots(); // refresh slots to remove the taken one
                    }
                })
                .catch(err => {
                    console.error('Booking Error:', err);
                    showMessage("A network error occurred.", "danger");
                });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - ClinicOS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .register-container { min-height: 100vh; background: linear-gradient(135deg, #e3f2fd 0%, #f1f8ff 100%); }
    </style>
</head>
<body class="register-container d-flex align-items-center">
    <div class="container animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-5">
                    <div class="stat-icon shadow-sm">
                        <i class="bi bi-heart-pulse"></i>
                    </div>
                    <h1 class="fw-bold text-primary mb-0">ClinicOS</h1>
                    <p class="text-muted fw-medium">Create a Patient Account</p>
                </div>

                <div class="card modern-card p-4">
                    <div class="card-body">
                        <h4 class="text-center mb-4 fw-bold text-secondary">Register</h4>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} shadow-sm border-0 d-flex align-items-center rounded-pill py-2">
                                        <i class="bi {% if category == 'success' %}bi-check-circle{% else %}bi-exclamation-triangle{% endif %} me-2"></i>
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" action="{{ url_for('auth.register') }}">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold text-secondary">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-success"></i></span>
                                    <input type="text" class="form-control border-start-0 bg-light" id="name" name="name" placeholder="John Doe" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold text-secondary">Email address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-success"></i></span>
                                    <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="name@example.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-secondary">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-success"></i></span>
                                    <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-premium w-100">
                                <i class="bi bi-person-plus me-2"></i> Create Account
                            </button>
                        </form>
                        <div class="mt-4 text-center">
                            <hr class="text-muted opacity-25">
                            <p class="mb-0 text-muted small">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold text-decoration-none">Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Clinic System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">My Appointments</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white">Hello, {{ current_user.name }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <h2>Patient Dashboard</h2>
                <hr>
                <div class="row mt-4">
                    <div class="col-md-4 mb-3">
                        <div class="card text-center text-white bg-primary shadow-sm">
                            <div class="card-body">
                                <h3 class="card-title" id="upcomingApptCount">0</h3>
                                <p class="card-text">Upcoming Appointments</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Book Appointment</h5>
                                <p class="card-text">Schedule a new appointment with our doctors.</p>
                                <a href="{{ url_for('appointments.book_appointment') }}" class="btn btn-primary">Book Now</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">My Upcoming Appointments</h5>
                            </div>
                            <div class="card-body" id="appointmentsContainer">
                                <p class="text-muted">Loading appointments...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reschedule Modal -->
    <div class="modal fade" id="rescheduleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reschedule Appointment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">New Date</label>
                        <input type="date" class="form-control" id="reschDate" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Time</label>
                        <input type="time" class="form-control" id="reschTime" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="submitReschedule()">Reschedule</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/appointments/my')
                .then(response => response.json())
                .then(data => {
                    const today = new Date().toISOString().split('T')[0];
                    const upcomingData = data.filter(appt => appt.date >= today);
                    
                    document.getElementById('upcomingApptCount').innerText = upcomingData.length;

                    const container = document.getElementById('appointmentsContainer');
                    if (!data || data.length === 0) {
                        container.innerHTML = '<p class="text-muted">You have no appointments on record.</p>';
                        return;
                    }

                    // Sort upcoming appointments by date, then by time
                    data.sort((a, b) => {
                        if (a.date !== b.date) return a.date.localeCompare(b.date);
                        return a.time.localeCompare(b.time);
                    });

                    let tableHTML = `
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Doctor</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.forEach(appt => {
                        let badgeClass = 'bg-secondary';
                        let statusText = appt.status.charAt(0).toUpperCase() + appt.status.slice(1);
                        if (appt.status === 'booked') badgeClass = 'bg-success';
                        if (appt.status === 'cancelled') badgeClass = 'bg-danger';

                        tableHTML += `
                            <tr>
                                <td>${appt.doctor_name}</td>
                                <td>${appt.date}</td>
                                <td>${appt.time}</td>
                                <td><span class="badge ${badgeClass}">${statusText}</span></td>
                                <td>
                                    ${appt.status !== 'cancelled' ? `
                                        <button class="btn btn-sm btn-outline-danger me-1" onclick="cancelAppointment('${appt.appointment_id}')">Cancel</button>
                                        <button class="btn btn-sm btn-outline-info" onclick="openRescheduleModal('${appt.appointment_id}')">Reschedule</button>
                                    ` : ''}
                                </td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                            </tbody>
                        </table>
                    `;
                    container.innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error('Error fetching appointments:', error);
                    document.getElementById('appointmentsContainer').innerHTML = '<p class="text-danger">Failed to load appointments.</p>';
                });
        });

        // Cancel Appointment Logic
        function cancelAppointment(id) {
            if (confirm("Are you sure you want to cancel this appointment?")) {
                fetch(`/appointments/cancel/${id}`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        alert(data.message);
                        window.location.reload();
                    } else {
                        alert(data.error || "An error occurred");
                    }
                })
                .catch(err => console.error(err));
            }
        }

        // Reschedule logic
        let currentRescheduleId = null;
        let reschModal;

        function openRescheduleModal(id) {
            currentRescheduleId = id;
            if (!reschModal) {
                reschModal = new bootstrap.Modal(document.getElementById('rescheduleModal'));
            }
            reschModal.show();
        }

        function submitReschedule() {
            const date = document.getElementById('reschDate').value;
            const time = document.getElementById('reschTime').value;

            if (!date || !time) {
                alert("Please select both a new date and a new time.");
                return;
            }

            fetch(`/appointments/reschedule/${currentRescheduleId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ date, time })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    alert(data.message);
                    window.location.reload();
                } else {
                    alert(data.error || "Failed to reschedule.");
                }
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
